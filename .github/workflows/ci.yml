name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# A future deploy job can be added as a downstream dependency of `checks` via
# `needs: checks` + `if: github.event_name == 'push' && github.ref == 'refs/heads/master'`.
# Out of MVP scope per PRD Epic 5.

jobs:
  checks:
    name: Lint, test & coverage (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # Matrix covers both the current production runtime (20.x) and the
        # target runtime (24.x). When Node 24 migration lands, drop 20.x.
        node-version: ['20.x', '24.x']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm test -- --coverage

      - name: Audit (high + critical only)
        run: npm audit --audit-level=high

      - name: Upload coverage report
        if: matrix.node-version == '24.x' && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.node-version }}
          path: coverage/
          retention-days: 14
