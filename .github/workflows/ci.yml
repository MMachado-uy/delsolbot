name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  checks:
    name: Lint, test & coverage (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # Production runtime per package.json engines. Add LTS versions here
        # if multi-version support becomes a goal.
        node-version: ['24.x']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm test -- --coverage

      - name: Audit (high + critical only)
        run: npm audit --audit-level=high

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 14

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: checks
    # Only deploy on direct pushes to master (which happens on PR merge).
    # Pull requests never trigger a deploy.
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    # Don't cancel an in-flight deploy if a second push arrives; queue instead.
    # Preserves atomicity of the `git reset + npm ci + pm2 restart` sequence.
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: Configure SSH
        # Load the deploy key into the runner's SSH agent and seed known_hosts
        # with the production host's live fingerprint. Keys and host live in
        # GitHub Secrets; see README for the expected secret names.
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync code, install, restart pm2
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PM2_NAME: ${{ secrets.DEPLOY_PM2_NAME }}
        run: |
          ssh -i ~/.ssh/id_deploy "${DEPLOY_USER}@${DEPLOY_HOST}" bash -s <<EOF
            set -eo pipefail

            # Non-interactive SSH sessions skip .bashrc, so nvm isn't loaded
            # automatically and npm/pm2 would resolve to the legacy system
            # node instead of the nvm-managed Node 24. Source nvm explicitly.
            export NVM_DIR="\$HOME/.nvm"
            # shellcheck disable=SC1091
            [ -s "\$NVM_DIR/nvm.sh" ] && . "\$NVM_DIR/nvm.sh"
            nvm use default

            cd "${DEPLOY_PATH}"
            git fetch --all --prune
            git reset --hard origin/master
            npm ci --omit=dev
            pm2 restart "${DEPLOY_PM2_NAME}"
            pm2 save
          EOF
